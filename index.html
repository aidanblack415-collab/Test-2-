<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USCP Advanced Practice Test</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f5f7;
      color: #111;
    }
    .wrap {
      max-width: 1000px;
      margin: 28px auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      padding: 24px;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 28px;
    }
    .meta, .progress, .score {
      color: #444;
      margin-bottom: 10px;
    }
    .question {
      font-size: 20px;
      margin: 18px 0;
      line-height: 1.45;
    }
    .choice {
      display: block;
      border: 1px solid #d3d8de;
      background: #fafbfc;
      border-radius: 10px;
      padding: 12px;
      margin: 10px 0;
      cursor: pointer;
    }
    .choice:hover {
      background: #eef3f8;
    }
    .choice input {
      margin-right: 10px;
    }
    .btns {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    button {
      background: #0b57d0;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 11px 16px;
      font-size: 15px;
      cursor: pointer;
    }
    button:disabled {
      background: #9aa0a6;
      cursor: not-allowed;
    }
    .feedback {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
    }
    .correct {
      background: #e6f4ea;
      border: 1px solid #a7d7b5;
    }
    .incorrect {
      background: #fde8e8;
      border: 1px solid #efb6b6;
    }
    .summary {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>USCP Advanced Practice Test</h1>
    <div class="meta">50 questions • harder scenarios • instant feedback</div>

    <div id="quiz">
      <div class="progress" id="progress"></div>
      <div class="score" id="scoreLine"></div>
      <div class="question" id="question"></div>
      <form id="choicesForm"></form>
      <div class="btns">
        <button type="button" id="checkBtn">Check Answer</button>
        <button type="button" id="nextBtn" disabled>Next Question</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="summary" id="summary">
      <h2>Test Complete</h2>
      <p id="finalScore"></p>
      <p id="finalPercent"></p>
      <button type="button" id="restartBtn">Restart Test</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        q: "Officers respond to a domestic call involving two people who dated for eight months and ended the relationship last week. The complainant says the suspect grabbed her by the wrist during an argument in a parking lot, twisted her arm, and said, 'Try leaving with my kid again and see what happens.' She reports pain but there is minimal visible redness. She now says she does not want him arrested because she only wanted the behavior documented. What is the best action?",
        choices: {
          A: "Decline arrest because there is no substantial visible injury",
          B: "Make an arrest if probable cause exists because pain and threatened serious harm can trigger mandatory arrest",
          C: "Separate the parties and let family court address it later",
          D: "Issue a citation because the parties never lived together"
        },
        answer: "B",
        explanation: "The relationship qualifies, and mandatory arrest can be based on probable cause of pain or reasonable fear of serious injury or death. Visible injury is not required."
      },
      {
        q: "Two spouses accuse each other during a domestic incident. One has light scratches across the chest. The other has bruising under the sleeves, avoids eye contact with the first party, and says the scratches were inflicted while trying to break free from being pinned. Which fact is least useful in deciding primary aggressor?",
        choices: {
          A: "Which person appears fearful during the encounter",
          B: "How the injury patterns fit the described struggle",
          C: "Which person first called 911 from the scene",
          D: "Whether the physical evidence matches one account better"
        },
        answer: "C",
        explanation: "Primary aggressor analysis focuses on fear, injury significance, physical evidence, and whether one story fits the scene. The first caller is not controlling."
      },
      {
        q: "A victim reports that her partner covered her mouth and squeezed her neck for several seconds. She denies blacking out but has a raspy voice, trouble swallowing, and red marks near the jawline. What is the best response?",

          A: "Treat it as minor because she stayed conscious",
          B: "Advise her to see a doctor later if swelling develops",
          C: "Call for medical aid because delayed internal injury is a major concern",
          D: "Limit the investigation to photographs unless breathing worsens"
        },
        answer: "C",
        explanation: "Strangulation may cause serious internal injury even without loss of consciousness. Voice changes, swallowing difficulty, and neck markings require medical attention."
      },
      {
        q: "A victim yells, 'He threw me into the dresser!' immediately as officers enter, then later calms down and becomes vague. That first statement is best treated as:",

          A: "Potential excited utterance",
          B: "Formal testimony",
          C: "Unusable hearsay",
          D: "Only impeachment material"
        },
        answer: "A",
        explanation: "A spontaneous statement made under the stress of the event may qualify as an excited utterance."

      {
        q: "A dating couple with no shared residence gets into a physical altercation. Which report approach is most accurate?",

          A: "Use only the label domestic violence instead of the criminal offense",

        answer: "B",

      },
      {

        explanation: "Under VAWA, qualifying protection orders from other jurisdictions receive full faith and credit."
      },
      {
        q: "At a domestic scene, the victim asks why officers are 'pushing the case' when she may not come to court. Which response best matches evidence-based prosecution?",

      {

        answer: "B",

      },
      {
        q: "A caregiver says a missing child is 'a bolt risk' and is fascinated by shiny surfaces. What concern does that most directly raise?",

      },
      {

      },
      {

      {

      },
      {

      {

      },
      {
        q: "What are officers specifically expected to do with door handles during building checks?",
        choices: {
          A: "Observe them visually unless there is obvious forced entry",
          B: "Photograph them if the office looks secured",
          C: "Physically shake all door handles",
          D: "Avoid touching them to preserve prints"
        },
        answer: "C",
        explanation: "The notes specifically instruct officers to physically shake all door handles during building checks."
      },
      {
        q: "At the start of a WTM assignment, which check is required?",
        choices: {
          A: "Ensure the unit has power, alarms on metal, and the zone lights work",
          B: "Test only alarm sound because zone lights are secondary",
          C: "Wait for the first live alarm to confirm operation",
          D: "Reposition the WTM if the line looks uneven, then test power only"
        },
        answer: "A",
        explanation: "Before beginning the shift, officers ensure the WTM is powered, alarms on metal, and has operational zone lights."
      },
      {
        q: "A current Member of Congress escorts three non-exempt visitors to an access point and insists they all bypass screening. What is the best response under the notes?",
        choices: {
          A: "Refuse entry to everyone until the visitors submit to screening",
          B: "Allow entry without documenting it because the Member is exempt",
          C: "Firmly explain the requirement, allow entry if the Member insists, record the details on a CP-60, and notify a supervisor",
          D: "Allow only the Member through and direct the visitors to another entrance"
        },
        answer: "C",
        explanation: "That is the specific procedure in the notes when a Member insists on escorting non-exempt individuals past screening."
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    const progressEl = document.getElementById("progress");
    const scoreLineEl = document.getElementById("scoreLine");
    const questionEl = document.getElementById("question");
    const choicesForm = document.getElementById("choicesForm");
    const feedbackEl = document.getElementById("feedback");
    const checkBtn = document.getElementById("checkBtn");
    const nextBtn = document.getElementById("nextBtn");
    const quizEl = document.getElementById("quiz");
    const summaryEl = document.getElementById("summary");
    const finalScoreEl = document.getElementById("finalScore");
    const finalPercentEl = document.getElementById("finalPercent");
    const restartBtn = document.getElementById("restartBtn");

    function renderQuestion() {
      answered = false;
      feedbackEl.style.display = "none";
      feedbackEl.className = "feedback";
      checkBtn.disabled = false;
      nextBtn.disabled = true;

      const q = questions[current];
      progressEl.textContent = `Question ${current + 1} of ${questions.length}`;
      scoreLineEl.textContent = `Score: ${score} / ${questions.length}`;
      questionEl.textContent = q.q;

      choicesForm.innerHTML = "";
      Object.entries(q.choices).forEach(([letter, text]) => {
        const label = document.createElement("label");
        label.className = "choice";
        label.innerHTML = `
          <input type="radio" name="answer" value="${letter}">
          <strong>${letter}.</strong> ${text}
        `;
        choicesForm.appendChild(label);
      });
    }

    function checkAnswer() {
      if (answered) return;

      const selected = document.querySelector('input[name="answer"]:checked');
      if (!selected) {
        feedbackEl.style.display = "block";
        feedbackEl.className = "feedback incorrect";
        feedbackEl.innerHTML = "<strong>Select an answer first.</strong>";
        return;
      }

      const q = questions[current];
      const correct = selected.value === q.answer;

      if (correct) score++;

      answered = true;
      checkBtn.disabled = true;
      nextBtn.disabled = false;

      feedbackEl.style.display = "block";
      feedbackEl.className = "feedback " + (correct ? "correct" : "incorrect");
      feedbackEl.innerHTML = `
        <strong>${correct ? "Correct." : "Incorrect."}</strong>
        The correct answer is <strong>${q.answer}</strong>.<br><br>
        ${q.explanation}
      `;

      scoreLineEl.textContent = `Score: ${score} / ${questions.length}`;
    }

    function nextQuestion() {
      if (current < questions.length - 1) {
        current++;
        renderQuestion();
      } else {
        showSummary();
      }
    }

    function showSummary() {
      quizEl.style.display = "none";
      summaryEl.style.display = "block";
      const percent = ((score / questions.length) * 100).toFixed(1);
      finalScoreEl.textContent = `Final Score: ${score} / ${questions.length}`;
      finalPercentEl.textContent = `Percentage: ${percent}%`;
    }

    function restartTest() {
      current = 0;
      score = 0;
      quizEl.style.display = "block";
      summaryEl.style.display = "none";
      renderQuestion();
    }

    checkBtn.addEventListener("click", checkAnswer);
    nextBtn.addEventListener("click", nextQuestion);
    restartBtn.addEventListener("click", restartTest);

    renderQuestion();
  </script>
</body>
</html>
